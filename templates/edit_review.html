<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>Edit Employee Record</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --color-primary: #1a3a5c;
            --color-primary-light: #2d5a8c;
            --color-primary-accent: #3d7ac2;
            --color-bg: linear-gradient(135deg, #eceff1 0%, #d4dfe6 100%);
            --color-card: #f8fafc;
            --color-text: #2c3e50;
            --color-text-light: #7f8c8d;
            --color-border: #bdc3c7;
            --spacing-xs: 0.5rem;
            --spacing-sm: 1rem;
            --spacing-md: 1.5rem;
            --spacing-lg: 2rem;
            --font-size-base: clamp(0.9rem, 2vw, 1rem);
            --font-size-lg: clamp(1rem, 2.5vw, 1.2rem);
            --font-size-xl: clamp(1.5rem, 4vw, 1.8rem);
        }

        body {
            font-family: "Segoe UI", "Helvetica Neue", sans-serif;
            background: var(--color-bg);
            color: var(--color-text);
            padding: clamp(0.5rem, 1%, 1rem);
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            background: #ffffff;
            border-radius: clamp(8px, 2vw, 12px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-light) 100%);
            color: white;
            padding: clamp(0.6rem, 1.5%, 0.9rem) clamp(1rem, 3%, 2rem);
            border-bottom: 3px solid var(--color-primary-accent);
        }
        .header .title-link {
            color: inherit;
            text-decoration: none;
            display: inline-block;
        }

        .header h1 {
            font-size: clamp(1.2rem, 2.5vw, 1.5rem);
            font-weight: 600;
            letter-spacing: 0.5px;
            margin: 0;
        }

        .content {
            padding: clamp(0.75rem, 1.5%, 1rem);
            max-height: calc(100vh - 100px);
            overflow-y: auto;
        }

        .form-section {
            margin-bottom: clamp(0.4rem, 1%, 0.6rem);
            background: var(--color-card);
            border-left: 4px solid var(--color-primary-accent);
            padding: clamp(0.5rem, 1%, 0.65rem) clamp(0.65rem, 1%, 0.8rem);
            border-radius: 6px;
        }

        .form-section h3 {
            color: var(--color-primary);
            font-size: clamp(0.7rem, 1.3vw, 0.85rem);
            font-weight: 600;
            margin-bottom: clamp(0.3rem, 0.7%, 0.5rem);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.9;
        }

        .fields-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: clamp(0.4rem, 0.8%, 0.6rem);
            margin-bottom: 0;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: clamp(0.2rem, 0.5%, 0.3rem);
        }

        .field.full-width {
            grid-column: 1 / -1;
        }

        label {
            font-size: clamp(0.6rem, 1.1vw, 0.7rem);
            font-weight: 600;
            color: var(--color-text);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        input[type="number"],
        select {
            padding: clamp(0.3rem, 0.8%, 0.4rem) clamp(0.4rem, 0.8%, 0.6rem);
            border: 1px solid var(--color-border);
            border-radius: 5px;
            font-size: clamp(0.75rem, 1.3vw, 0.8rem);
            color: var(--color-text);
            background: white;
            transition: border-color 0.2s, box-shadow 0.2s;
            font-family: inherit;
            width: 100%;
        }

        input:disabled {
            background: #ecf0f1;
            color: var(--color-text-light);
            cursor: not-allowed;
        }

        input[readonly] {
            background: #f0f4f8;
            color: var(--color-text-light);
            cursor: default;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--color-primary-accent);
            box-shadow: 0 0 0 3px rgba(61, 122, 194, 0.1);
        }

        button[type="submit"] {
            background: linear-gradient(135deg, var(--color-primary-light) 0%, var(--color-primary) 100%);
            color: white;
            padding: clamp(0.5rem, 0.8%, 0.65rem) clamp(1.25rem, 2%, 1.5rem);
            border: none;
            border-radius: 6px;
            font-size: clamp(0.7rem, 1.2vw, 0.8rem);
            font-weight: 600;
            cursor: pointer;
            margin-top: clamp(0.5rem, 1%, 0.75rem);
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(45, 90, 140, 0.3);
        }

        @media (max-width: 1200px) {
            .fields-row {
                grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .fields-row {
                grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            }

            .content {
                padding: clamp(0.75rem, 1.5%, 1rem);
            }
        }

        @media (max-width: 600px) {
            .fields-row {
                grid-template-columns: 1fr;
            }

            .form-section {
                margin-bottom: clamp(0.4rem, 1%, 0.6rem);
                padding: clamp(0.5rem, 1%, 0.65rem) clamp(0.65rem, 1%, 0.8rem);
            }
        }

        /* Employment Details - wider layout for better spacing */
        .form-section:nth-of-type(7) .fields-row {
            grid-template-columns: repeat(auto-fit, minmax(clamp(140px, 50%, 200px), 1fr));
        }

        @media (max-width: 1200px) {
            .form-section:nth-of-type(7) .fields-row {
                grid-template-columns: repeat(auto-fit, minmax(clamp(130px, 48%, 180px), 1fr));
            }
        }

        @media (max-width: 768px) {
            .form-section:nth-of-type(7) .fields-row {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Scroll styling */
        .content::-webkit-scrollbar {
            width: 8px;
        }

        .content::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .content::-webkit-scrollbar-thumb {
            background: var(--color-primary-accent);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><a href="/" class="title-link">Edit Employee Record</a></h1>

        </div>
        <div class="content">
            <form action="/review/{{ employee.id }}" method="post">

                <!-- Personal Information -->
                <div class="form-section">
                    <h3>Personal Information</h3>
                    <div class="fields-row">
                        <div class="field"><label>ID</label><input type="text" name="id" value="{{ employee.id }}" readonly></div>
                        <div class="field"><label>First Name</label><input type="text" name="first_name" value="{{ employee.first_name or '' }}"></div>
                        <div class="field"><label>Last Name</label><input type="text" name="last_name" value="{{ employee.last_name or '' }}"></div>
                        <div class="field"><label>Gender</label><select name="gender"><option value="">Choose</option><option value="male" {% if employee.gender == "male" %}selected{% endif %}>Male</option><option value="female" {% if employee.gender == "female" %}selected{% endif %}>Female</option><option value="non-binary" {% if employee.gender == "non-binary" %}selected{% endif %}>Non-binary</option></select></div>
                        <div class="field"><label>Date of Birth</label><input type="date" name="date_of_birth" value="{{ employee.date_of_birth or '' }}"></div>
                    </div>
                </div>

                <!-- Contact & Location -->
                <div class="form-section">
                    <h3>Contact & Location</h3>
                    <div class="fields-row">
                        <div class="field"><label>Phone</label><input type="tel" name="phone" value="{{ employee.phone or '' }}"></div>
                        <div class="field"><label>Email</label><input type="email" name="email" value="{{ employee.email or '' }}"></div>
                        <div class="field"><label>Street & House No.</label><input type="text" name="street_and_house_number" value="{{ employee.street_and_house_number or '' }}"></div>
                        <div class="field"><label>ZIP Code</label><input type="text" name="zip_code" value="{{ employee.zip_code or '' }}"></div>
                        <div class="field"><label>City</label><input type="text" name="city" value="{{ employee.city or '' }}"></div>
                        <div class="field"><label>Country</label><input type="text" name="country" value="{{ employee.country or 'Deutschland' }}"></div>
                    </div>
                </div>

                <!-- Birth & Origin -->
                <div class="form-section">
                    <h3>Birth & Origin</h3>
                    <div class="fields-row">
                        <div class="field"><label>Place of Birth</label><input type="text" name="place_of_birth" value="{{ employee.place_of_birth or '' }}"></div>
                        <div class="field"><label>Country of Birth</label><input type="text" name="country_of_birth" value="{{ employee.country_of_birth or '' }}"></div>
                        <div class="field"><label>Nationality</label><input type="text" name="nationality" value="{{ employee.nationality or '' }}" list="nationality-list"></div>
                    </div>
                </div>

                <!-- Identity Documents -->
                <div class="form-section">
                    <h3>Identity Documents</h3>
                    <div class="fields-row">
                        <div class="field"><label>Ausweis Number</label><input type="text" name="ausweis_number" value="{{ employee.ausweis_number or '' }}"></div>
                        <div class="field"><label>Ausweis Expiry</label><input type="date" name="ausweis_expiry_date" value="{{ employee.ausweis_expiry_date or '' }}"></div>
                        <div class="field"><label>Reisepass Number</label><input type="text" name="reise_pass_number" value="{{ employee.reise_pass_number or '' }}"></div>
                        <div class="field"><label>Reisepass Expiry</label><input type="date" name="reise_pass_expiry_date" value="{{ employee.reise_pass_expiry_date or '' }}"></div>
                    </div>
                </div>

                <!-- Insurance & Tax -->
                <div class="form-section">
                    <h3>Insurance & Tax</h3>
                    <div class="fields-row">
                        <div class="field"><label>Krankenkasse</label><input type="text" name="krankenkasse" value="{{ employee.krankenkasse or '' }}"></div>
                        <div class="field"><label>Krankenkasse Nr.</label><input type="text" name="krankenkasse_nummer" value="{{ employee.krankenkasse_nummer or '' }}"></div>
                        <div class="field"><label>Steuer ID</label><input type="text" name="steuer_id" value="{{ employee.steuer_id or '' }}"></div>
                        <div class="field"><label>Steuerklasse</label><input type="number" name="steuerklasse" min="1" max="6" value="{{ employee.steuerklasse or '' }}"></div>
                        <div class="field"><label>Sozialversicherungsnummer</label><input type="text" name="sozialversicherungsnummer" value="{{ employee.sozialversicherungsnummer or '' }}"></div>
                    </div>
                </div>

                <!-- Banking -->
                <div class="form-section">
                    <h3>Banking Information</h3>
                    <div class="fields-row">
                        <div class="field"><label>Bank Name</label><input type="text" name="bank_name" value="{{ employee.bank_name or '' }}"></div>
                        <div class="field"><label>BIC</label><input type="text" name="bank_bic" value="{{ employee.bank_bic or '' }}"></div>
                        <div class="field"><label>Account Holder</label><input type="text" name="bank_account_holder" value="{{ employee.bank_account_holder or '' }}"></div>
                        <div class="field full-width"><label>IBAN</label><input type="text" name="bank_iban" value="{{ employee.bank_iban or '' }}"></div>
                    </div>
                </div>

                <!-- Employment Details -->
                <div class="form-section">
                    <h3>Employment Details</h3>
                    <div class="fields-row">
                        <div class="field">
                            <label>City of Work</label>
                            <select id="work_city_select" onchange="handleWorkCityChange(this)">
                                <option value="">Choose City</option>
                                <option value="Bergisch Gladbach" {% if employee.work_city == "Bergisch Gladbach" %}selected{% endif %}>Bergisch Gladbach</option>
                                <option value="Berlin" {% if employee.work_city == "Berlin" %}selected{% endif %}>Berlin</option>
                                <option value="Düsseldorf" {% if employee.work_city == "Düsseldorf" %}selected{% endif %}>Düsseldorf</option>
                                <option value="Frankfurt" {% if employee.work_city == "Frankfurt" %}selected{% endif %}>Frankfurt</option>
                                <option value="Hamburg" {% if employee.work_city == "Hamburg" %}selected{% endif %}>Hamburg</option>
                                <option value="Köln" {% if employee.work_city == "Köln" %}selected{% endif %}>Köln</option>
                                <option value="Wien" {% if employee.work_city == "Wien" %}selected{% endif %}>Wien</option>
                                <option value="other" {% if employee.work_city and employee.work_city not in ["Bergisch Gladbach", "Berlin", "Düsseldorf", "Frankfurt", "Hamburg", "Köln", "Wien"] %}selected{% endif %}>Other</option>
                            </select>
                            <input type="text" name="work_city" id="work_city_input" placeholder="Enter city..." value="{{ employee.work_city or '' }}" style="display:none; margin-top:4px;">
                        </div>
                        <div class="field">
                            <label>Hotel Name</label>
                            <select id="hotel_name_select" name="hotel_name_select" onchange="handleHotelNameChange(this)">
                                <option value="">Choose Hotel</option>
                                <option value="Hotel Adlon Kempinski">Hotel Adlon Kempinski</option>
                                <option value="Grand Hyatt Berlin">Grand Hyatt Berlin</option>
                                <option value="China Club Berlin">China Club Berlin</option>
                                <option value="Kontor Haus">Kontor Haus</option>
                                <option value="Linden Palais">Linden Palais</option>
                                <option value="Pressehaus Podium">Pressehaus Podium</option>
                                <option value="Hyatt Regency Vienna">Hyatt Regency Vienna</option>
                                <option value="Park Hyatt Vienna">Park Hyatt Vienna</option>
                                <option value="other">Other</option>
                            </select>
                            <input type="text" name="hotel_name_custom" id="hotel_name_input" placeholder="Enter hotel..." value="{{ employee.hotel_name or '' }}" style="display:none; margin-top:4px;">
                        </div>
                        <div class="field">
                            <label>Occupation</label>
                            <select id="occupation_select" onchange="handleOccupationChange(this)">
                                <option value="">Choose Occupation</option>
                                <option value="other">Other</option>
                            </select>
                            <input type="text" name="occupation" id="occupation_input" placeholder="Enter occupation..." value="{{ employee.occupation or '' }}" style="display:none; margin-top:4px;">
                        </div>
                        <div id="department-field" class="field" style="display:none;">
                            <label>Department / Work Area</label>
                            <select name="department" id="department">
                                <option value="">— Select Department —</option>
                                <option value="Reinigung">Reinigung</option>
                                <option value="Stewarding / Geschirrspüler">Stewarding / Geschirrspüler</option>
                                <option value="Housekeeping / Zimmerreinigung">Housekeeping / Zimmerreinigung</option>
                                <option value="Nachtreinigung">Nachtreinigung</option>
                                <option value="Hausmann- / Wäscheabteilung">Hausmann- / Wäscheabteilung</option>
                                <option value="Public Area">Public Area</option>
                            </select>
                        </div>
                        <div class="field"><label>Employment Type</label><select name="employment_type"><option value="">Choose</option><option value="Vollzeit" {% if employee.employment_type == "Vollzeit" %}selected{% endif %}>Vollzeit (Full-time)</option><option value="Teilzeit" {% if employee.employment_type == "Teilzeit" %}selected{% endif %}>Teilzeit (Part-time)</option><option value="Minijob" {% if employee.employment_type == "Minijob" %}selected{% endif %}>Minijob</option></select></div>
                        <div class="field"><label>Start Date</label><input type="date" name="start_date" id="start_date" value="{{ employee.start_date or '' }}" onchange="autoFillEndDate()"></div>
                        <div class="field"><label>End Date</label><input type="date" name="end_date" id="end_date" value="{{ employee.end_date or '' }}"></div>
                        <div class="field"><label>Contract Type</label><select name="contract_type" id="contract_type" onchange="handleContractDurationChange(this)"><option value="temporary" {% if employee.contract_type != "permanent" %}selected{% endif %}>Temporary</option><option value="permanent" {% if employee.contract_type == "permanent" %}selected{% endif %}>Permanent</option></select></div>
                        <div class="field"><label>Work Schedule Preset</label><select id="schedule_preset" onchange="applySchedulePreset(this)"><option value="">Choose Preset</option><option value="20|5|4">20 hrs / 5 days / 4 hrs/day</option><option value="24|3|8">24 hrs / 3 days / 8 hrs/day</option><option value="25|5|5">25 hrs / 5 days / 5 hrs/day</option><option value="30|5|6">30 hrs / 5 days / 6 hrs/day</option><option value="32|4|8">32 hrs / 4 days / 8 hrs/day</option><option value="35|5|7">35 hrs / 5 days / 7 hrs/day</option><option value="40|5|8">40 hrs / 5 days / 8 hrs/day</option><option value="other">Custom</option></select></div>
                        <div class="field"><label>Weekly Hours</label><input type="number" name="weekly_hours" id="weekly_hours" min="1" max="60" step="0.5" value="{{ employee.weekly_hours or '' }}" placeholder="40" readonly></div>
                        <div class="field"><label>Work Days/Week</label><input type="number" name="work_days_per_week" id="work_days_per_week" min="1" max="7" value="{{ employee.work_days_per_week or '' }}" placeholder="5" readonly></div>
                        <div class="field"><label>Hours/Day</label><input type="number" name="daily_hours" id="daily_hours" min="1" max="24" step="0.5" value="{{ employee.daily_hours or '' }}" placeholder="8" readonly></div>
                        <div class="field"><label>Status</label><select name="status"><option value="draft" {% if employee.status == "draft" %}selected{% endif %}>Draft</option><option value="under_review" {% if employee.status == "under_review" %}selected{% endif %}>Under Review</option><option value="approved" {% if employee.status == "approved" %}selected{% endif %}>Approved</option></select></div>
                        <div class="field full-width"><label>Ordio ID</label><input type="text" name="ordio_id" value="{{ employee.ordio_id or '' }}"></div>
                    </div>
                </div>

                <button type="submit">Save Changes</button>
            </form>
        </div>
    </div>

    <datalist id="nationality-list">
        <option value="Afghan"></option>
        <option value="Albanian"></option>
        <option value="Algerian"></option>
        <option value="American"></option>
        <option value="Austrian"></option>
        <option value="Belgian"></option>
        <option value="British"></option>
        <option value="Chinese"></option>
        <option value="Danish"></option>
        <option value="Dutch"></option>
        <option value="French"></option>
        <option value="German"></option>
        <option value="Greek"></option>
        <option value="Hungarian"></option>
        <option value="Indian"></option>
        <option value="Irish"></option>
        <option value="Italian"></option>
        <option value="Japanese"></option>
        <option value="Korean"></option>
        <option value="Mexican"></option>
        <option value="Pakistani"></option>
        <option value="Polish"></option>
        <option value="Portuguese"></option>
        <option value="Russian"></option>
        <option value="Spanish"></option>
        <option value="Swedish"></option>
        <option value="Swiss"></option>
    </datalist>
    <script>
        // ── Data ─────────────────────────────────────────────────────────────────
        const CITY_OCCUPATION_OPTIONS = {
            berlin: [
                'HSK', 'Zimmermädchen', 'Minibar', 'Reinigungskraft',
                'Glasreiniger', 'Public Area', 'Hausmann', 'STW', 'NR',
                'Floor Supervisor', 'HSK Supervisor', 'HSK Manager', 'other'
            ],
            wien: [
                'Reinigungskraft', 'Reinigungskraft TD', 'Reinigungskraft PA',
                'Reinigungskraft HM', 'Reinigungskraft NR', 'Reinigungskraft Public',
                'Reinigungskraft STW', 'Zimmermädchen', 'HSK Supervisor', 'HSK Manager',
                'Ass. HSK Manager', 'STW Supervisor', 'STW Manager',
                'Objektleitung NR', 'Quality Manager', 'other'
            ],
            bergisch_gladbach: ['Hausmann', 'HSK', 'HSK Supervisor', 'NR', 'other'],
            duesseldorf: ['NR', 'STW', 'other'],
            frankfurt: ['NR', 'Public Area', 'other'],
            hamburg: ['NR', 'Public Area', 'other'],
        };

        const CITY_ROLE_SCHEDULES = {
            wien: {
                'Reinigungskraft':        ['20|5|4'],
                'Reinigungskraft TD':     ['20|5|4', '25|5|5', '30|5|6'],
                'Reinigungskraft PA':     ['32|4|8'],
                'Reinigungskraft HM':     ['40|5|8'],
                'Reinigungskraft NR':     ['40|5|8'],
                'Reinigungskraft Public': ['40|5|8'],
                'Reinigungskraft STW':    ['40|5|8'],
                'Zimmermädchen':          ['24|3|8', '30|5|6', '32|4|8', '40|5|8'],
                'HSK Supervisor':         ['32|4|8', '40|5|8'],
                'HSK Manager':            ['40|5|8'],
                'Ass. HSK Manager':       ['40|5|8'],
                'STW Supervisor':         ['40|5|8'],
                'STW Manager':            ['40|5|8'],
                'Objektleitung NR':       ['40|5|8'],
                'Quality Manager':        ['40|5|8'],
            }
        };

        const ALL_SCHEDULE_PRESETS = [
            { value: '20|5|4', label: '20 hrs / 5 days / 4 hrs/day' },
            { value: '24|3|8', label: '24 hrs / 3 days / 8 hrs/day' },
            { value: '25|5|5', label: '25 hrs / 5 days / 5 hrs/day' },
            { value: '30|5|6', label: '30 hrs / 5 days / 6 hrs/day' },
            { value: '32|4|8', label: '32 hrs / 4 days / 8 hrs/day' },
            { value: '35|5|7', label: '35 hrs / 5 days / 7 hrs/day' },
            { value: '40|5|8', label: '40 hrs / 5 days / 8 hrs/day' },
        ];

        const KNOWN_HOTELS = [
            'Hotel Adlon Kempinski', 'Grand Hyatt Berlin', 'China Club Berlin',
            'Kontor Haus', 'Linden Palais', 'Pressehaus Podium', 'Hyatt Regency Vienna', 'Park Hyatt Vienna'
        ];

        const KNOWN_CITIES_LIST = ['Bergisch Gladbach', 'Berlin', 'Düsseldorf', 'Frankfurt', 'Hamburg', 'Köln', 'Wien'];

        // ── Helpers ───────────────────────────────────────────────────────────────
        function normalizeCityForOptions(city) {
            const c = (city || '').trim().toLowerCase();
            if (c === 'berlin') return 'berlin';
            if (c === 'wien' || c === 'vienna') return 'wien';
            if (c === 'bergisch gladbach' || c === 'bergisch_gladbach') return 'bergisch_gladbach';
            if (c === 'düsseldorf' || c === 'dusseldorf' || c === 'duesseldorf') return 'duesseldorf';
            if (c === 'frankfurt') return 'frankfurt';
            if (c === 'hamburg') return 'hamburg';
            return null;
        }

        // ── Occupation ────────────────────────────────────────────────────────────
        function populateOccupationOptions(cityKey) {
            const select = document.getElementById('occupation_select');
            const occInput = document.getElementById('occupation_input');
            const currentVal = occInput.value.trim();
            const allowed = CITY_OCCUPATION_OPTIONS[cityKey] || ['other'];

            select.innerHTML = '<option value="">Choose Occupation</option>';
            for (const occ of allowed) {
                const opt = document.createElement('option');
                opt.value = occ;
                opt.textContent = occ === 'other' ? 'Other' : occ;
                select.appendChild(opt);
            }

            // Restore selection if still valid in new city
            if (currentVal && allowed.includes(currentVal)) {
                select.value = currentVal;
                occInput.style.display = 'none';
            } else if (currentVal) {
                select.value = 'other';
                occInput.style.display = 'block';
            } else {
                occInput.style.display = 'none';
            }

            // Sync department visibility
            _syncDepartment(select.value);
        }

        function _syncDepartment(occupationValue) {
            const deptField = document.getElementById('department-field');
            if (!deptField) return;
            const showDept = occupationValue === 'Reinigungskraft';
            deptField.style.display = showDept ? 'flex' : 'none';
            if (!showDept) {
                const deptSelect = document.getElementById('department');
                if (deptSelect) deptSelect.value = '';
            }
        }

        // ── Schedule presets ──────────────────────────────────────────────────────
        function updateScheduleOptionsForSelection() {
            const citySelect = document.getElementById('work_city_select');
            const cityInput = document.getElementById('work_city_input');
            const occInput = document.getElementById('occupation_input');
            const presetSelect = document.getElementById('schedule_preset');

            const cityRaw = citySelect.value === 'other' ? cityInput.value : citySelect.value;
            const cityKey = normalizeCityForOptions(cityRaw);
            const occupation = occInput.value.trim();
            const currentPreset = presetSelect.value;

            const cityRules = CITY_ROLE_SCHEDULES[cityKey];
            const allowedPresets = cityRules ? (cityRules[occupation] || null) : null;

            presetSelect.innerHTML = '<option value="">Choose Preset</option>';
            const presetsToShow = allowedPresets
                ? ALL_SCHEDULE_PRESETS.filter(p => allowedPresets.includes(p.value))
                : ALL_SCHEDULE_PRESETS;

            for (const p of presetsToShow) {
                const opt = document.createElement('option');
                opt.value = p.value;
                opt.textContent = p.label;
                presetSelect.appendChild(opt);
            }
            const customOpt = document.createElement('option');
            customOpt.value = 'other';
            customOpt.textContent = 'Custom';
            presetSelect.appendChild(customOpt);

            const stillValid = [...presetSelect.options].some(o => o.value === currentPreset);
            if (stillValid && currentPreset) {
                presetSelect.value = currentPreset;
            } else if (currentPreset && currentPreset !== '') {
                // Preset no longer valid — clear schedule fields
                presetSelect.value = '';
                const wh = document.getElementById('weekly_hours');
                const dpw = document.getElementById('work_days_per_week');
                const dh = document.getElementById('daily_hours');
                wh.value = ''; wh.readOnly = true; wh.style.opacity = '0.75';
                dpw.value = ''; dpw.readOnly = true; dpw.style.opacity = '0.75';
                dh.value = ''; dh.readOnly = true; dh.style.opacity = '0.75';
            }
        }

        // ── City change ───────────────────────────────────────────────────────────
        function handleWorkCityChange(select) {
            const input = document.getElementById('work_city_input');
            const hotelSelect = document.getElementById('hotel_name_select');
            const hotelInput = document.getElementById('hotel_name_input');

            if (select.value === 'other') {
                input.style.display = 'block';
                input.value = '';
                input.focus();
            } else {
                input.style.display = 'none';
                input.value = select.value;
            }

            const selectedCity = (select.value || '').toLowerCase();
            const isBerlin = selectedCity === 'berlin';
            const isWien = selectedCity === 'wien' || selectedCity === 'vienna';
            const berlinHotels = [
                'Hotel Adlon Kempinski', 'Grand Hyatt Berlin', 'China Club Berlin',
                'Kontor Haus', 'Linden Palais', 'Pressehaus Podium'
            ];
            const wienHotels = ['Hyatt Regency Vienna', 'Park Hyatt Vienna'];

            for (const opt of hotelSelect.options) {
                if (!opt.value || opt.value === 'other') {
                    opt.style.display = 'block';
                    continue;
                }
                if (isBerlin) {
                    opt.style.display = berlinHotels.includes(opt.value) ? 'block' : 'none';
                } else if (isWien) {
                    opt.style.display = wienHotels.includes(opt.value) ? 'block' : 'none';
                } else {
                    opt.style.display = 'none';
                }
            }
            if (!isBerlin && !isWien) {
                hotelSelect.value = '';
                if (hotelInput) { hotelInput.style.display = 'none'; hotelInput.value = ''; }
            }

            const cityRaw = select.value === 'other' ? input.value : select.value;
            populateOccupationOptions(normalizeCityForOptions(cityRaw));
            updateScheduleOptionsForSelection();
        }

        // ── Occupation change ─────────────────────────────────────────────────────
        function handleOccupationChange(select) {
            const input = document.getElementById('occupation_input');
            if (select.value === 'other') {
                input.style.display = 'block';
                input.value = '';
                input.focus();
            } else {
                input.style.display = 'none';
                input.value = select.value;
            }
            _syncDepartment(select.value);
            updateScheduleOptionsForSelection();
        }

        // ── Hotel change ──────────────────────────────────────────────────────────
        function handleHotelNameChange(select) {
            const input = document.getElementById('hotel_name_input');
            if (!input) return;
            if (select.value === 'other') {
                input.style.display = 'block';
                if (!input.value) input.focus();
            } else {
                input.style.display = 'none';
                input.value = '';
            }
        }

        // ── Schedule preset ───────────────────────────────────────────────────────
        function applySchedulePreset(select) {
            const wh  = document.getElementById('weekly_hours');
            const dpw = document.getElementById('work_days_per_week');
            const dh  = document.getElementById('daily_hours');

            if (select.value === 'other') {
                wh.readOnly = false; dpw.readOnly = false; dh.readOnly = false;
                wh.style.opacity = '1'; dpw.style.opacity = '1'; dh.style.opacity = '1';
            } else if (select.value) {
                const [weekly, days, daily] = select.value.split('|');
                wh.value = weekly; dpw.value = days; dh.value = daily;
                wh.readOnly = true; dpw.readOnly = true; dh.readOnly = true;
                wh.style.opacity = '0.75'; dpw.style.opacity = '0.75'; dh.style.opacity = '0.75';
            } else {
                wh.readOnly = true; dpw.readOnly = true; dh.readOnly = true;
                wh.style.opacity = '0.75'; dpw.style.opacity = '0.75'; dh.style.opacity = '0.75';
            }
        }

        // ── Contract type ─────────────────────────────────────────────────────────
        function handleContractDurationChange(select) {
            const endDate = document.getElementById('end_date');
            if (select.value === 'permanent') {
                endDate.value = '';
                endDate.disabled = true;
                endDate.style.opacity = '0.4';
            } else {
                endDate.disabled = false;
                endDate.style.opacity = '1';
            }
        }

        function autoFillEndDate() {
            const endDate = document.getElementById('end_date');
            if (endDate.disabled) return;
            const startVal = document.getElementById('start_date').value;
            if (!startVal) return;
            const start = new Date(startVal);
            const end = new Date(start);
            end.setFullYear(end.getFullYear() + 1);
            end.setDate(end.getDate() - 1);
            endDate.value = end.toISOString().split('T')[0];
        }

        // ── Init ──────────────────────────────────────────────────────────────────
        (function init() {
            // Contract type
            const ctSelect = document.getElementById('contract_type');
            if (ctSelect && ctSelect.value === 'permanent') {
                const endDate = document.getElementById('end_date');
                endDate.disabled = true;
                endDate.style.opacity = '0.4';
            }

            // City
            const citySelect = document.getElementById('work_city_select');
            const cityInput  = document.getElementById('work_city_input');
            const savedCity  = {{ employee.work_city | tojson }};

            if (savedCity && KNOWN_CITIES_LIST.includes(savedCity)) {
                citySelect.value = savedCity;
                cityInput.value  = savedCity;
            } else if (savedCity) {
                citySelect.value = 'other';
                cityInput.style.display = 'block';
                cityInput.value = savedCity;
            }

            // Hotel
            const hotelSelect = document.getElementById('hotel_name_select');
            const hotelInput  = document.getElementById('hotel_name_input');
            const savedHotel  = {{ employee.hotel_name | tojson }};
            const selectedCity = (savedCity || '').toLowerCase();
            const isBerlin    = selectedCity === 'berlin';
            const isWien      = selectedCity === 'wien' || selectedCity === 'vienna';
            const berlinHotels = [
                'Hotel Adlon Kempinski', 'Grand Hyatt Berlin', 'China Club Berlin',
                'Kontor Haus', 'Linden Palais', 'Pressehaus Podium'
            ];
            const wienHotels = ['Hyatt Regency Vienna', 'Park Hyatt Vienna'];

            for (const opt of hotelSelect.options) {
                if (!opt.value || opt.value === 'other') {
                    opt.style.display = 'block';
                    continue;
                }
                if (isBerlin) {
                    opt.style.display = berlinHotels.includes(opt.value) ? 'block' : 'none';
                } else if (isWien) {
                    opt.style.display = wienHotels.includes(opt.value) ? 'block' : 'none';
                } else {
                    opt.style.display = 'none';
                }
            }
            if (savedHotel && KNOWN_HOTELS.includes(savedHotel)) {
                hotelSelect.value = savedHotel;
                if (hotelInput) { hotelInput.style.display = 'none'; hotelInput.value = ''; }
            } else if (savedHotel) {
                hotelSelect.value = 'other';
                if (hotelInput) { hotelInput.style.display = 'block'; hotelInput.value = savedHotel; }
            }

            // Occupation — set hidden input first so populateOccupationOptions can restore it
            const savedOccupation = {{ employee.occupation | tojson }};
            document.getElementById('occupation_input').value = savedOccupation || '';
            const cityKey = normalizeCityForOptions(savedCity);
            populateOccupationOptions(cityKey);

            // Department
            const deptSelect = document.getElementById('department');
            if (deptSelect) deptSelect.value = {{ employee.department | tojson }};

            // Schedule presets — build the filtered list first
            updateScheduleOptionsForSelection();

            const savedWeekly = {{ employee.weekly_hours | tojson }};
            const savedDays   = {{ employee.work_days_per_week | tojson }};
            const savedDaily  = {{ employee.daily_hours | tojson }};
            const wh  = document.getElementById('weekly_hours');
            const dpw = document.getElementById('work_days_per_week');
            const dh  = document.getElementById('daily_hours');

            if (savedWeekly) {
                wh.value = savedWeekly; dpw.value = savedDays || ''; dh.value = savedDaily || '';
                const key = `${savedWeekly}|${savedDays}|${savedDaily}`;
                const presetSelect = document.getElementById('schedule_preset');
                let matched = false;
                for (const opt of presetSelect.options) {
                    if (opt.value === key) { presetSelect.value = key; matched = true; break; }
                }
                if (matched) {
                    wh.readOnly = true; dpw.readOnly = true; dh.readOnly = true;
                    wh.style.opacity = '0.75'; dpw.style.opacity = '0.75'; dh.style.opacity = '0.75';
                } else {
                    presetSelect.value = 'other';
                    wh.readOnly = false; dpw.readOnly = false; dh.readOnly = false;
                    wh.style.opacity = '1'; dpw.style.opacity = '1'; dh.style.opacity = '1';
                }
            } else {
                wh.readOnly = true; dpw.readOnly = true; dh.readOnly = true;
                wh.style.opacity = '0.75'; dpw.style.opacity = '0.75'; dh.style.opacity = '0.75';
            }
        })();
    </script>
</body>
