<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>Edit Employee Record</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --color-primary: #1a3a5c;
            --color-primary-light: #2d5a8c;
            --color-primary-accent: #3d7ac2;
            --color-bg: linear-gradient(135deg, #eceff1 0%, #d4dfe6 100%);
            --color-card: #f8fafc;
            --color-text: #2c3e50;
            --color-text-light: #7f8c8d;
            --color-border: #bdc3c7;
            --spacing-xs: 0.5rem;
            --spacing-sm: 1rem;
            --spacing-md: 1.5rem;
            --spacing-lg: 2rem;
            --font-size-base: clamp(0.9rem, 2vw, 1rem);
            --font-size-lg: clamp(1rem, 2.5vw, 1.2rem);
            --font-size-xl: clamp(1.5rem, 4vw, 1.8rem);
        }

        body {
            font-family: "Segoe UI", "Helvetica Neue", sans-serif;
            background: var(--color-bg);
            color: var(--color-text);
            padding: clamp(0.5rem, 1%, 1rem);
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            background: #ffffff;
            border-radius: clamp(8px, 2vw, 12px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-light) 100%);
            color: white;
            padding: clamp(0.6rem, 1.5%, 0.9rem) clamp(1rem, 3%, 2rem);
            border-bottom: 3px solid var(--color-primary-accent);
        }

        .header h1 {
            font-size: clamp(1.2rem, 2.5vw, 1.5rem);
            font-weight: 600;
            letter-spacing: 0.5px;
            margin: 0;
        }

        .content {
            padding: clamp(0.75rem, 1.5%, 1rem);
            max-height: calc(100vh - 100px);
            overflow-y: auto;
        }

        .form-section {
            margin-bottom: clamp(0.4rem, 1%, 0.6rem);
            background: var(--color-card);
            border-left: 4px solid var(--color-primary-accent);
            padding: clamp(0.5rem, 1%, 0.65rem) clamp(0.65rem, 1%, 0.8rem);
            border-radius: 6px;
        }

        .form-section h3 {
            color: var(--color-primary);
            font-size: clamp(0.7rem, 1.3vw, 0.85rem);
            font-weight: 600;
            margin-bottom: clamp(0.3rem, 0.7%, 0.5rem);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.9;
        }

        .fields-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: clamp(0.4rem, 0.8%, 0.6rem);
            margin-bottom: 0;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: clamp(0.2rem, 0.5%, 0.3rem);
        }

        .field.full-width {
            grid-column: 1 / -1;
        }

        label {
            font-size: clamp(0.6rem, 1.1vw, 0.7rem);
            font-weight: 600;
            color: var(--color-text);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        input[type="number"],
        select {
            padding: clamp(0.3rem, 0.8%, 0.4rem) clamp(0.4rem, 0.8%, 0.6rem);
            border: 1px solid var(--color-border);
            border-radius: 5px;
            font-size: clamp(0.75rem, 1.3vw, 0.8rem);
            color: var(--color-text);
            background: white;
            transition: border-color 0.2s, box-shadow 0.2s;
            font-family: inherit;
            width: 100%;
        }

        input:disabled {
            background: #ecf0f1;
            color: var(--color-text-light);
            cursor: not-allowed;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--color-primary-accent);
            box-shadow: 0 0 0 3px rgba(61, 122, 194, 0.1);
        }

        button[type="submit"] {
            background: linear-gradient(135deg, var(--color-primary-light) 0%, var(--color-primary) 100%);
            color: white;
            padding: clamp(0.5rem, 0.8%, 0.65rem) clamp(1.25rem, 2%, 1.5rem);
            border: none;
            border-radius: 6px;
            font-size: clamp(0.7rem, 1.2vw, 0.8rem);
            font-weight: 600;
            cursor: pointer;
            margin-top: clamp(0.5rem, 1%, 0.75rem);
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(45, 90, 140, 0.3);
        }

        @media (max-width: 1200px) {
            .fields-row {
                grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .fields-row {
                grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            }

            .content {
                padding: clamp(0.75rem, 1.5%, 1rem);
            }
        }

        @media (max-width: 600px) {
            .fields-row {
                grid-template-columns: 1fr;
            }

            .form-section {
                margin-bottom: clamp(0.4rem, 1%, 0.6rem);
                padding: clamp(0.5rem, 1%, 0.65rem) clamp(0.65rem, 1%, 0.8rem);
            }
        }

        /* Employment Details - wider layout for better spacing */
        .form-section:nth-of-type(7) .fields-row {
            grid-template-columns: repeat(auto-fit, minmax(clamp(140px, 50%, 200px), 1fr));
        }

        @media (max-width: 1200px) {
            .form-section:nth-of-type(7) .fields-row {
                grid-template-columns: repeat(auto-fit, minmax(clamp(130px, 48%, 180px), 1fr));
            }
        }

        @media (max-width: 768px) {
            .form-section:nth-of-type(7) .fields-row {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Scroll styling */
        .content::-webkit-scrollbar {
            width: 8px;
        }

        .content::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .content::-webkit-scrollbar-thumb {
            background: var(--color-primary-accent);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Edit Employee Record</h1>
        </div>
        <div class="content">
            <form action="/review/{{ employee.id }}" method="post">

                <!-- Personal Information -->
                <div class="form-section">
                    <h3>Personal Information</h3>
                    <div class="fields-row">
                        <div class="field"><label>ID</label><input type="text" name="id" value="{{ employee.id }}" readonly></div>
                        <div class="field"><label>First Name</label><input type="text" name="first_name" value="{{ employee.first_name or '' }}"></div>
                        <div class="field"><label>Last Name</label><input type="text" name="last_name" value="{{ employee.last_name or '' }}"></div>
                        <div class="field"><label>Gender</label><select name="gender"><option value="">Choose</option><option value="male" {% if employee.gender == "male" %}selected{% endif %}>Male</option><option value="female" {% if employee.gender == "female" %}selected{% endif %}>Female</option><option value="non-binary" {% if employee.gender == "non-binary" %}selected{% endif %}>Non-binary</option></select></div>
                        <div class="field"><label>Date of Birth</label><input type="date" name="date_of_birth" value="{{ employee.date_of_birth or '' }}"></div>
                    </div>
                </div>

                <!-- Contact & Location -->
                <div class="form-section">
                    <h3>Contact & Location</h3>
                    <div class="fields-row">
                        <div class="field"><label>Phone</label><input type="tel" name="phone" value="{{ employee.phone or '' }}"></div>
                        <div class="field"><label>Email</label><input type="email" name="email" value="{{ employee.email or '' }}"></div>
                        <div class="field"><label>Street & House No.</label><input type="text" name="street_and_house_number" value="{{ employee.street_and_house_number or '' }}"></div>
                        <div class="field"><label>ZIP Code</label><input type="text" name="zip_code" value="{{ employee.zip_code or '' }}"></div>
                        <div class="field"><label>City</label><input type="text" name="city" value="{{ employee.city or '' }}"></div>
                        <div class="field"><label>Country</label><input type="text" name="country" value="{{ employee.country or 'Deutschland' }}"></div>
                    </div>
                </div>

                <!-- Birth & Origin -->
                <div class="form-section">
                    <h3>Birth & Origin</h3>
                    <div class="fields-row">
                        <div class="field"><label>Place of Birth</label><input type="text" name="place_of_birth" value="{{ employee.place_of_birth or '' }}"></div>
                        <div class="field"><label>Country of Birth</label><input type="text" name="country_of_birth" value="{{ employee.country_of_birth or '' }}"></div>
                        <div class="field"><label>Nationality</label><input type="text" name="nationality" value="{{ employee.nationality or '' }}" list="nationality-list"></div>
                    </div>
                </div>

                <!-- Identity Documents -->
                <div class="form-section">
                    <h3>Identity Documents</h3>
                    <div class="fields-row">
                        <div class="field"><label>Ausweis Number</label><input type="text" name="ausweis_number" value="{{ employee.ausweis_number or '' }}"></div>
                        <div class="field"><label>Ausweis Expiry</label><input type="date" name="ausweis_expiry_date" value="{{ employee.ausweis_expiry_date or '' }}"></div>
                        <div class="field"><label>Reisepass Number</label><input type="text" name="reise_pass_number" value="{{ employee.reise_pass_number or '' }}"></div>
                        <div class="field"><label>Reisepass Expiry</label><input type="date" name="reise_pass_expiry_date" value="{{ employee.reise_pass_expiry_date or '' }}"></div>
                    </div>
                </div>

                <!-- Insurance & Tax -->
                <div class="form-section">
                    <h3>Insurance & Tax</h3>
                    <div class="fields-row">
                        <div class="field"><label>Krankenkasse</label><input type="text" name="krankenkasse" value="{{ employee.krankenkasse or '' }}"></div>
                        <div class="field"><label>Krankenkasse Nr.</label><input type="text" name="krankenkasse_nummer" value="{{ employee.krankenkasse_nummer or '' }}"></div>
                        <div class="field"><label>Steuer ID</label><input type="text" name="steuer_id" value="{{ employee.steuer_id or '' }}"></div>
                        <div class="field"><label>Steuerklasse</label><input type="number" name="steuerklasse" min="1" max="6" value="{{ employee.steuerklasse or '' }}"></div>
                        <div class="field"><label>Sozialversicherungsnummer</label><input type="text" name="sozialversicherungsnummer" value="{{ employee.sozialversicherungsnummer or '' }}"></div>
                    </div>
                </div>

                <!-- Banking -->
                <div class="form-section">
                    <h3>Banking Information</h3>
                    <div class="fields-row">
                        <div class="field"><label>Bank Name</label><input type="text" name="bank_name" value="{{ employee.bank_name or '' }}"></div>
                        <div class="field"><label>BIC</label><input type="text" name="bank_bic" value="{{ employee.bank_bic or '' }}"></div>
                        <div class="field"><label>Account Holder</label><input type="text" name="bank_account_holder" value="{{ employee.bank_account_holder or '' }}"></div>
                        <div class="field full-width"><label>IBAN</label><input type="text" name="bank_iban" value="{{ employee.bank_iban or '' }}"></div>
                    </div>
                </div>

                <!-- Employment Details -->
                <div class="form-section">
                    <h3>Employment Details</h3>
                    <div class="fields-row">
                        <div class="field">
                            <label>City of Work</label>
                            <select id="work_city_select" onchange="handleWorkCityChange(this)">
                                <option value="">Choose City</option>
                                <option value="Bergisch Gladbach" {% if employee.work_city == "Bergisch Gladbach" %}selected{% endif %}>Bergisch Gladbach</option>
                                <option value="Berlin" {% if employee.work_city == "Berlin" %}selected{% endif %}>Berlin</option>
                                <option value="Düsseldorf" {% if employee.work_city == "Düsseldorf" %}selected{% endif %}>Düsseldorf</option>
                                <option value="Frankfurt" {% if employee.work_city == "Frankfurt" %}selected{% endif %}>Frankfurt</option>
                                <option value="Hamburg" {% if employee.work_city == "Hamburg" %}selected{% endif %}>Hamburg</option>
                                <option value="Köln" {% if employee.work_city == "Köln" %}selected{% endif %}>Köln</option>
                                <option value="Wien" {% if employee.work_city == "Wien" %}selected{% endif %}>Wien</option>
                                <option value="other" {% if employee.work_city and employee.work_city not in ["Bergisch Gladbach", "Berlin", "Düsseldorf", "Frankfurt", "Hamburg", "Köln", "Wien"] %}selected{% endif %}>Other</option>
                            </select>
                            <input type="text" name="work_city" id="work_city_input" placeholder="Enter city..." value="{{ employee.work_city or '' }}" style="display:none; margin-top:4px;">
                        </div>
                        <div class="field">
                            <label>Hotel Name</label>
                            <select id="hotel_name_select" name="hotel_name_select" onchange="handleHotelNameChange(this)">
                                <option value="">Choose Hotel</option>
                                <option value="Adlon Hotel Berlin" {% if employee.hotel_name == "Adlon Hotel Berlin" %}selected{% endif %}>Adlon Hotel Berlin</option>
                                <option value="Grand Hyatt Berlin" {% if employee.hotel_name == "Grand Hyatt Berlin" %}selected{% endif %}>Grand Hyatt Berlin</option>
                                <option value="other" {% if employee.hotel_name and employee.hotel_name not in ["Adlon Hotel Berlin", "Grand Hyatt Berlin"] %}selected{% endif %}>Other</option>
                            </select>
                            <input type="text" name="hotel_name_custom" id="hotel_name_input" placeholder="Enter hotel..." value="{{ employee.hotel_name if employee.hotel_name not in ['Adlon Hotel Berlin', 'Grand Hyatt Berlin'] else '' }}" style="display:none; margin-top:4px;">
                        </div>
                        <div class="field">
                            <label>Occupation</label>
                            <select id="occupation_select" onchange="handleOccupationChange(this)">
                                <option value="">Choose Occupation</option>
                                <optgroup label="Management">
                                    <option value="Floor Supervisor" {% if employee.occupation == "Floor Supervisor" %}selected{% endif %}>Floor Supervisor</option>
                                    <option value="HSK Supervisor" {% if employee.occupation == "HSK Supervisor" %}selected{% endif %}>HSK Supervisor</option>
                                    <option value="HSK Manager" {% if employee.occupation == "HSK Manager" %}selected{% endif %}>HSK Manager</option>
                                </optgroup>
                                <optgroup label="Housekeeping">
                                    <option value="HSK" {% if employee.occupation == "HSK" %}selected{% endif %}>HSK (Housekeeping)</option>
                                    <option value="Zimmermädchen" {% if employee.occupation == "Zimmermädchen" %}selected{% endif %}>Zimmermädchen</option>
                                </optgroup>
                                <optgroup label="Cleaning">
                                    <option value="Reinigungskraft" {% if employee.occupation == "Reinigungskraft" %}selected{% endif %}>Reinigungskraft</option>
                                    <option value="Glasreiniger" {% if employee.occupation == "Glasreiniger" %}selected{% endif %}>Glasreiniger</option>
                                </optgroup>
                                <option value="other" {% if employee.occupation and employee.occupation not in ["Floor Supervisor", "HSK Supervisor", "HSK Manager", "HSK", "Zimmermädchen", "Reinigungskraft", "Glasreiniger"] %}selected{% endif %}>Other</option>
                            </select>
                            <input type="text" name="occupation" id="occupation_input" placeholder="Enter occupation..." value="{{ employee.occupation or '' }}" style="display:none; margin-top:4px;">
                        </div>
                        <div class="field"><label>Employment Type</label><select name="employment_type"><option value="">Choose</option><option value="Vollzeit" {% if employee.employment_type == "Vollzeit" %}selected{% endif %}>Vollzeit (Full-time)</option><option value="Teilzeit" {% if employee.employment_type == "Teilzeit" %}selected{% endif %}>Teilzeit (Part-time)</option><option value="Minijob" {% if employee.employment_type == "Minijob" %}selected{% endif %}>Minijob</option></select></div>
                        <div class="field"><label>Start Date</label><input type="date" name="start_date" id="start_date" value="{{ employee.start_date or '' }}" onchange="autoFillEndDate()"></div>
                        <div class="field"><label>End Date</label><input type="date" name="end_date" id="end_date" value="{{ employee.end_date or '' }}"></div>
                        <div class="field"><label>Contract Type</label><select name="contract_type" id="contract_type" onchange="handleContractDurationChange(this)"><option value="temporary" {% if employee.contract_type != "permanent" %}selected{% endif %}>Temporary</option><option value="permanent" {% if employee.contract_type == "permanent" %}selected{% endif %}>Permanent</option></select></div>
                        <div class="field"><label>Work Schedule Preset</label><select id="schedule_preset" onchange="applySchedulePreset(this)"><option value="">Choose Preset</option><option value="20|5|4">20 hrs / 5 days / 4 hrs/day</option><option value="24|3|8">24 hrs / 3 days / 8 hrs/day</option><option value="25|5|5">25 hrs / 5 days / 5 hrs/day</option><option value="30|5|6">30 hrs / 5 days / 6 hrs/day</option><option value="32|4|8">32 hrs / 4 days / 8 hrs/day</option><option value="35|5|7">35 hrs / 5 days / 7 hrs/day</option><option value="40|5|8">40 hrs / 5 days / 8 hrs/day</option><option value="other">Custom</option></select></div>
                        <div class="field"><label>Weekly Hours</label><input type="number" name="weekly_hours" id="weekly_hours" min="1" max="60" step="0.5" value="{{ employee.weekly_hours or '' }}" placeholder="40" disabled></div>
                        <div class="field"><label>Work Days/Week</label><input type="number" name="work_days_per_week" id="work_days_per_week" min="1" max="7" value="{{ employee.work_days_per_week or '' }}" placeholder="5" disabled></div>
                        <div class="field"><label>Hours/Day</label><input type="number" name="daily_hours" id="daily_hours" min="1" max="24" step="0.5" value="{{ employee.daily_hours or '' }}" placeholder="8" disabled></div>
                        <div class="field"><label>Status</label><select name="status"><option value="draft" {% if employee.status == "draft" %}selected{% endif %}>Draft</option><option value="under_review" {% if employee.status == "under_review" %}selected{% endif %}>Under Review</option><option value="approved" {% if employee.status == "approved" %}selected{% endif %}>Approved</option></select></div>
                        <div class="field full-width"><label>Ordio ID</label><input type="text" name="ordio_id" value="{{ employee.ordio_id or '' }}"></div>
                    </div>
                </div>

                <button type="submit">Save Changes</button>
            </form>
        </div>
    </div>

    <datalist id="nationality-list">
        <option value="Afghan"></option>
        <option value="Albanian"></option>
        <option value="Algerian"></option>
        <option value="American"></option>
        <option value="Austrian"></option>
        <option value="Belgian"></option>
        <option value="British"></option>
        <option value="Chinese"></option>
        <option value="Danish"></option>
        <option value="Dutch"></option>
        <option value="French"></option>
        <option value="German"></option>
        <option value="Greek"></option>
        <option value="Hungarian"></option>
        <option value="Indian"></option>
        <option value="Irish"></option>
        <option value="Italian"></option>
        <option value="Japanese"></option>
        <option value="Korean"></option>
        <option value="Mexican"></option>
        <option value="Pakistani"></option>
        <option value="Polish"></option>
        <option value="Portuguese"></option>
        <option value="Russian"></option>
        <option value="Spanish"></option>
        <option value="Swedish"></option>
        <option value="Swiss"></option>
    </datalist>
    <script>
        const KNOWN_CITIES = ["Berlin", "Köln", "Wien", "Frankfurt", "Hamburg", "Düsseldorf"];

        function handleWorkCityChange(select) {
            const input = document.getElementById('work_city_input');
            if (select.value === 'other') {
                input.style.display = 'block';
                input.value = '';
                input.focus();
            } else {
                input.style.display = 'none';
                input.value = select.value;
            }
        }

        function handleOccupationChange(select) {
            const input = document.getElementById('occupation_input');
            if (select.value === 'other') {
                input.style.display = 'block';
                input.value = '';
                input.focus();
            } else {
                input.style.display = 'none';
                input.value = select.value;
            }
        }

        function handleHotelNameChange(select) {
            const input = document.getElementById('hotel_name_input');
            if (select.value === 'other') {
                input.style.display = 'block';
                input.value = '';
                input.focus();
            } else {
                input.style.display = 'none';
                input.value = '';
            }
        }

        function applySchedulePreset(select) {
            const weeklyInput = document.getElementById('weekly_hours');
            const daysInput = document.getElementById('work_days_per_week');
            const dailyInput = document.getElementById('daily_hours');
            const contractSelect = document.getElementById('contract_type');

            if (select.value === 'other') {
                // Enable custom fields when "other" is selected
                weeklyInput.disabled = false;
                daysInput.disabled = false;
                dailyInput.disabled = false;
                contractSelect.disabled = false;
                weeklyInput.style.opacity = '1';
                daysInput.style.opacity = '1';
                dailyInput.style.opacity = '1';
                contractSelect.style.opacity = '1';
            } else if (select.value) {
                // Apply preset and disable custom fields
                const [weekly, days, daily] = select.value.split('|');
                weeklyInput.value = weekly;
                daysInput.value = days;
                dailyInput.value = daily;
                weeklyInput.disabled = true;
                daysInput.disabled = true;
                dailyInput.disabled = true;
                contractSelect.disabled = true;
                weeklyInput.style.opacity = '0.5';
                daysInput.style.opacity = '0.5';
                dailyInput.style.opacity = '0.5';
                contractSelect.style.opacity = '0.5';
            } else {
                // No preset selected, disable custom fields
                weeklyInput.disabled = true;
                daysInput.disabled = true;
                dailyInput.disabled = true;
                contractSelect.disabled = true;
                weeklyInput.style.opacity = '0.5';
                daysInput.style.opacity = '0.5';
                dailyInput.style.opacity = '0.5';
                contractSelect.style.opacity = '0.5';
            }
        }

        function calcDailyHours() {
            const weekly = parseFloat(document.getElementById('weekly_hours').value);
            const days   = parseFloat(document.getElementById('work_days_per_week').value);
            if (weekly > 0 && days > 0) {
                const daily = weekly / days;
                document.getElementById('daily_hours').value = Number.isInteger(daily) ? daily : daily.toFixed(1);
            }
        }

        function handleContractDurationChange(select) {
            const endDate = document.getElementById('end_date');
            if (select.value === 'permanent') {
                endDate.value = '';
                endDate.disabled = true;
                endDate.style.opacity = '0.4';
            } else {
                endDate.disabled = false;
                endDate.style.opacity = '1';
            }
        }

        function autoFillEndDate() {
            const endDate = document.getElementById('end_date');
            if (endDate.disabled) return;
            const startVal = document.getElementById('start_date').value;
            if (!startVal) return;
            const start = new Date(startVal);
            const end = new Date(start);
            end.setFullYear(end.getFullYear() + 1);
            end.setDate(end.getDate() - 1);
            endDate.value = end.toISOString().split('T')[0];
        }

        // Disable end date on load if contract is permanent and add event listeners
        (function initContractDuration() {
            const select = document.getElementById('contract_type');
            if (select && select.value === 'permanent') {
                const endDate = document.getElementById('end_date');
                endDate.disabled = true;
                endDate.style.opacity = '0.4';
            }

            // Add event listeners for automatic calculation
            const weeklyInput = document.getElementById('weekly_hours');
            const daysInput = document.getElementById('work_days_per_week');
            if (weeklyInput && daysInput) {
                weeklyInput.addEventListener('change', calcDailyHours);
                weeklyInput.addEventListener('input', calcDailyHours);
                daysInput.addEventListener('change', calcDailyHours);
                daysInput.addEventListener('input', calcDailyHours);
            }
        })();

        // Pre-select schedule preset if it matches the saved values
        (function initSchedulePreset() {
            const weekly = document.getElementById('weekly_hours').value;
            const days   = document.getElementById('work_days_per_week').value;
            const daily  = document.getElementById('daily_hours').value;
            if (!weekly) return;
            const key = `${weekly}|${days}|${daily}`;
            const preset = document.getElementById('schedule_preset');
            for (const opt of preset.options) {
                if (opt.value === key) { preset.value = key; break; }
            }
        })();

        // Pre-populate the city dropdown from the existing saved value
        (function initWorkCity() {
            const input = document.getElementById('work_city_input');
            const select = document.getElementById('work_city_select');
            const savedCity = input.value.trim();
            if (!savedCity) return;
            if (KNOWN_CITIES.includes(savedCity)) {
                select.value = savedCity;
            } else {
                select.value = 'other';
                input.style.display = 'block';
            }
        })();

        // Pre-populate the occupation dropdown from the existing saved value
        (function initOccupation() {
            const input = document.getElementById('occupation_input');
            const select = document.getElementById('occupation_select');
            const savedOccupation = input.value.trim();
            if (!savedOccupation) return;
            // Try to find it in the select options
            let found = false;
            for (const option of select.options) {
                if (option.value === savedOccupation) {
                    select.value = savedOccupation;
                    found = true;
                    break;
                }
            }
            if (!found) {
                select.value = 'other';
                input.style.display = 'block';
            }
        })();

        // Pre-populate hotel name dropdown from existing value
        (function initHotelName() {
            const input = document.getElementById('hotel_name_input');
            const select = document.getElementById('hotel_name_select');
            const savedHotel = input.value.trim();
            if (!savedHotel) return;

            if (["Adlon Hotel Berlin", "Grand Hyatt Berlin"].includes(savedHotel)) {
                select.value = savedHotel;
            } else {
                select.value = 'other';
                input.style.display = 'block';
            }
        })();
    </script>
</body>
</html>
